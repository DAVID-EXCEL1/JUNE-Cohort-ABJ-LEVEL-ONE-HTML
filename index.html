<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>

<body>
    <table border="1" style="border-collapse: collapse;">
        <tr>
            <td>S/N</td>
            <td>Name</td>
            <td>Class</td>
            <td>Account Balance (₦)</td>
        </tr>
        <tr>
            <td>1.</td>
            <td>Armani</td>
            <td>SE- WDFS</td>
            <td>50.00</td>
        </tr>
        <tr>
            <td>2.</td>
            <td colspan="2">David</td>
            <!-- <td>SE - APS</td> -->
            <td>100.00</td>
        </tr>
    </table>

    <br>
    <hr>
    <table border="1" style="border-collapse: collapse;">
        <thead style="background-color: red;">
            <th>S/N</th>
            <th>Name</th>
            <th>Class</th>
            <th>Account Balance (₦)</th>
        </thead>
        <tr>
            <td colspan="">1.</td>
            <td>Timothy</td>
            <td rowspan="2">SE- WDFS</td>
            <td>50.00</td>
        </tr>
        <tr>
            <td>2.</td>
            <td>Destiny</td>
            <!-- <td>SE - WDFS</td> -->
            <td>100.00</td>
        </tr>
    </table>
</body>

</html>
